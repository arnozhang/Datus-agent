name: unit test
on:
  workflow_dispatch:
    inputs:
      force-rebuild-kb:
        description: 'Force rebuild knowledge base data'
        type: boolean
        default: false
  workflow_call:
    inputs:
      force-rebuild-kb:
        type: boolean
        default: false
    outputs:
      build-artifact:
        description: "Built artifact path"
        value: ${{ jobs.build.outputs.build-artifact }}

jobs:
  run-ut:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Clean up stale temp files
        run: |
          echo "Cleaning stale pytest temp directories..."
          find /tmp/pytest-of-* -maxdepth 1 -type d -mtime +1 -exec rm -rf {} + 2>/dev/null || true
          echo "Cleaning stale .pyc caches..."
          find "$GITHUB_WORKSPACE" -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
          echo "Disk usage: $(df -h /tmp | tail -1 | awk '{print $5, $4}')"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          pip install --upgrade --no-cache-dir datus-semantic-metricflow

      - name: Setup config file
        run: |
          cp /home/datus_ci/ci_template/agent.yml conf/agent.yml
          cp /home/datus_ci/ci_template/ci.env .env

      - name: Isolate test data directory
        run: |
          DATUS_TEST_HOME="${GITHUB_WORKSPACE}/.datus_test_data"
          echo "DATUS_TEST_HOME=$DATUS_TEST_HOME" >> $GITHUB_ENV
          sed -i "s|home: ~/.datus/tests|home: $DATUS_TEST_HOME|g" tests/conf/agent.yml
          sed -i "s|workspace_root: ~/.datus/tests/workspace|workspace_root: $DATUS_TEST_HOME/workspace|g" tests/conf/agent.yml

      - name: Load environment variables
        run: |
          echo "Loading environment variables from .env file..."
          # Export all variables from .env to GITHUB_ENV so they persist across steps
          while IFS= read -r line || [ -n "$line" ]; do
            # Skip empty lines and comments
            if [[ ! -z "$line" && ! "$line" =~ ^[[:space:]]*# ]]; then
              # Remove any surrounding whitespace and export to GITHUB_ENV
              var_name=$(echo "$line" | cut -d'=' -f1)
              var_value=$(echo "$line" | cut -d'=' -f2-)
              echo "::add-mask::$var_value"
              echo "Loading variable: $var_name"
              echo "$line" >> $GITHUB_ENV
            fi
          done < .env
          echo "Environment variables loaded successfully"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Restore knowledge base cache
        id: kb-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ github.workspace }}/.datus_test_data/data/datus_db_bird_school
            ${{ github.workspace }}/.datus_test_data/data/datus_db_ssb_sqlite
          key: ${{ runner.os }}-kb-${{ hashFiles('build_scripts/build_test_data.sh', 'sample_data/**', 'datus/storage/**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-kb-

      - name: run unit tests (no external deps, before KB build)
        run: |
          python -m pytest tests/unit_tests/ -m "not nightly" -q --tb=short

      - name: Build test data
        id: build-test-data
        if: steps.kb-cache.outputs.cache-hit != 'true' || inputs.force-rebuild-kb == true
        run: |
          echo "Building test data before running pytest..."
          chmod +x build_scripts/build_test_data.sh
          ./build_scripts/build_test_data.sh || exit 1
          echo "Test data build completed"

      - name: Save knowledge base cache
        if: steps.build-test-data.outcome == 'success'
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ github.workspace }}/.datus_test_data/data/datus_db_bird_school
            ${{ github.workspace }}/.datus_test_data/data/datus_db_ssb_sqlite
          key: ${{ runner.os }}-kb-${{ hashFiles('build_scripts/build_test_data.sh', 'sample_data/**', 'datus/storage/**/*.py') }}

      - name: run acceptance tests
        run: |
          python -m pytest -m acceptance tests/

      - name: run regression tests (single model)
        run: |
          python -m pytest -m regression --single-model tests/regression/test_regression_llm.py
